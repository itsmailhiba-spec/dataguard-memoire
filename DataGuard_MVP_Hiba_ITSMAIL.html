<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DataGuard — Diagnostic de robustesse des modèles d'IA</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  html,body,#root { margin:0; padding:0; }
  body { background:#F5F3EC; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const NAVY="#12233F", INK="#0E1B30", SLATE="#5A6B85", MIST="#8A99B3";
const PAPER="#F5F3EC", CARD="#FFFFFF", LINE="#E3E0D6";
const TEAL="#1E8A7A", AMBER="#E0A106", RED="#C64A3B", GREEN="#2F8F5B";

const MODELS = [
  { name: "Random Forest", r2: 0.897, color: "#1E8A7A" },
  { name: "XGBoost", r2: 0.892, color: "#3E6DB5" },
  { name: "Régression linéaire", r2: 0.714, color: "#E0A106" },
  { name: "SVR", r2: 0.593, color: "#C64A3B" },
];
const CURVES = {
  "Random Forest": [0.877, 0.86, 0.83, 0.77, 0.58],
  "XGBoost": [0.872, 0.85, 0.82, 0.75, 0.56],
  "Régression linéaire": [0.728, 0.71, 0.69, 0.64, 0.57],
  "SVR": [0.528, 0.48, 0.42, 0.33, 0.19],
};
const LEVELS = [0, 5, 10, 20, 40];
const STEPS = [
  { id: 1, label: "Audit qualité", short: "Audit" },
  { id: 2, label: "Contrôle avant entraînement", short: "Contrôle" },
  { id: 3, label: "Diagnostic de robustesse", short: "Diagnostic" },
  { id: 4, label: "Surveillance continue", short: "Surveillance" },
];
const DATASETS = {
  propre: { label: "Ventes_2024_propre.csv", rows: 4000, missing: 1.2, dups: 0.3, incoh: 0.5, score: 0.94 },
  degrade: { label: "Ventes_2024_degrade.csv", rows: 4240, missing: 18.4, dups: 6.1, incoh: 9.7, score: 0.52 },
};

function Ring({ value, size=128, stroke=12, color }) {
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c*(1-value);
  return (
    <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={LINE} strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
        style={{ transition:"stroke-dashoffset 1.1s cubic-bezier(.2,.8,.2,1)" }} />
    </svg>
  );
}

function Logo() {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
      <div style={{ width:30, height:30, borderRadius:8, background:NAVY, display:"grid", placeItems:"center" }}>
        <div style={{ width:12, height:12, border:`2.5px solid ${TEAL}`, borderRadius:3, transform:"rotate(45deg)" }} />
      </div>
      <span style={{ fontWeight:800, fontSize:19, letterSpacing:-0.5, color:NAVY }}>DataGuard</span>
    </div>
  );
}

function Home({ onStart }) {
  return (
    <div className="fade" style={{ maxWidth:1080, margin:"0 auto", padding:"0 20px" }}>
      <nav style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"28px 0" }}>
        <Logo />
        <span className="mono" style={{ fontSize:12, color:MIST, letterSpacing:1 }}>MVP · MÉMOIRE 2025–2026</span>
      </nav>
      <div style={{ display:"grid", gridTemplateColumns:"1.15fr .85fr", gap:48, alignItems:"center", padding:"40px 0 56px" }}>
        <div>
          <div className="mono" style={{ color:TEAL, fontSize:13, letterSpacing:2, marginBottom:18, fontWeight:600 }}>DIAGNOSTIC DE ROBUSTESSE</div>
          <h1 style={{ fontSize:52, lineHeight:1.05, margin:"0 0 22px", fontWeight:800, letterSpacing:-1.5, color:NAVY }}>
            Vos données sont-elles<br />assez fiables pour<br />votre IA ?
          </h1>
          <p style={{ fontSize:18, lineHeight:1.6, color:SLATE, margin:"0 0 32px", maxWidth:460 }}>
            DataGuard audite la qualité de vos données, vérifie qu'elles sont aptes à
            l'entraînement, teste la résistance de vos modèles à la dégradation, et vous
            alerte avant que la fiabilité ne baisse.
          </p>
          <button className="btn" onClick={onStart}
            style={{ background:NAVY, color:"#fff", padding:"16px 32px", borderRadius:12, fontSize:16, fontWeight:600 }}>
            Lancer un diagnostic →
          </button>
        </div>
        <div className="card" style={{ padding:28 }}>
          <div style={{ fontSize:13, fontWeight:700, color:MIST, letterSpacing:1, marginBottom:20 }}>LE PARCOURS EN 4 ÉTAPES</div>
          {STEPS.map((s, i) => (
            <div key={s.id} style={{ display:"flex", gap:16, alignItems:"flex-start", padding:"14px 0", borderTop: i ? `1px solid ${LINE}` : "none" }}>
              <div style={{ minWidth:32, height:32, borderRadius:9, background:PAPER, border:`1px solid ${LINE}`,
                display:"grid", placeItems:"center", fontWeight:700, color:NAVY, fontSize:14 }}>{s.id}</div>
              <div>
                <div style={{ fontWeight:650, fontSize:15, color:INK }}>{s.label}</div>
                <div style={{ fontSize:13, color:SLATE, marginTop:2 }}>{[
                  "Taux de manquants, doublons, score global",
                  "Comparaison à un seuil minimal de qualité",
                  "Courbes de dégradation par modèle",
                  "Alerte quand la performance chute",
                ][i]}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{ display:"flex", gap:40, padding:"28px 0 60px", borderTop:`1px solid ${LINE}` }}>
        {[["4","modèles comparés"],["5","types de dégradation"],["5","niveaux d'intensité"],["≈0,90","R² sur données propres"]].map(([n,l]) => (
          <div key={l}>
            <div style={{ fontSize:30, fontWeight:800, color:NAVY }}>{n}</div>
            <div style={{ fontSize:13, color:SLATE }}>{l}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function TopBar({ onReset }) {
  return (
    <nav style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"24px 0" }}>
      <Logo />
      <button className="btn" onClick={onReset} style={{ background:"transparent", color:SLATE, fontSize:14, fontWeight:600, padding:"8px 14px", borderRadius:8, border:`1px solid ${LINE}` }}>↺ Recommencer</button>
    </nav>
  );
}

function Stepper({ step, maxStep, onJump }) {
  return (
    <div style={{ display:"flex", gap:8, margin:"8px 0 28px" }}>
      {STEPS.map((s) => {
        const done=s.id<step, active=s.id===step, avail=s.id<=maxStep;
        return (
          <button key={s.id} className="btn" onClick={() => onJump(s.id)} disabled={!avail}
            style={{ flex:1, textAlign:"left", padding:"12px 14px", borderRadius:10, cursor:avail?"pointer":"default",
              background:active?NAVY:done?"#EAF3F1":CARD, color:active?"#fff":done?TEAL:MIST,
              border:`1px solid ${active?NAVY:done?"#CFE7E1":LINE}` }}>
            <div style={{ fontSize:11, fontWeight:700, letterSpacing:0.5, opacity:0.8 }}>ÉTAPE {s.id}</div>
            <div style={{ fontSize:13.5, fontWeight:650, marginTop:2 }}>{s.short} {done && "✓"}</div>
          </button>
        );
      })}
    </div>
  );
}

function SectionTitle({ kicker, title, desc }) {
  return (
    <div style={{ marginBottom:22 }}>
      <div className="mono" style={{ color:TEAL, fontSize:12, letterSpacing:1.5, fontWeight:600, marginBottom:8 }}>{kicker}</div>
      <h2 style={{ fontSize:26, fontWeight:800, margin:"0 0 8px", color:NAVY, letterSpacing:-0.5 }}>{title}</h2>
      <p style={{ fontSize:15.5, color:SLATE, margin:0, lineHeight:1.55, maxWidth:640 }}>{desc}</p>
    </div>
  );
}

function StepAudit({ dataset, setDataset, onNext }) {
  const [loading, setLoading] = useState(false);
  const d = dataset ? DATASETS[dataset] : null;
  const load = (key) => { setLoading(true); setDataset(null); setTimeout(() => { setDataset(key); setLoading(false); }, 900); };
  return (
    <div>
      <SectionTitle kicker="ÉTAPE 1 / 4" title="Audit de la qualité des données"
        desc="Chargez un jeu de données. DataGuard mesure le taux de valeurs manquantes, de doublons et d'incohérences, puis calcule un score de qualité global entre 0 et 1." />
      <div style={{ display:"flex", gap:12, marginBottom:24, flexWrap:"wrap" }}>
        <button className="btn" onClick={() => load("propre")}
          style={{ background:dataset==="propre"?NAVY:CARD, color:dataset==="propre"?"#fff":INK, border:`1px solid ${dataset==="propre"?NAVY:LINE}`, padding:"14px 18px", borderRadius:11, fontSize:14, fontWeight:600, display:"flex", gap:10, alignItems:"center" }}>
          <span>📄</span> Charger un jeu propre
        </button>
        <button className="btn" onClick={() => load("degrade")}
          style={{ background:dataset==="degrade"?NAVY:CARD, color:dataset==="degrade"?"#fff":INK, border:`1px solid ${dataset==="degrade"?NAVY:LINE}`, padding:"14px 18px", borderRadius:11, fontSize:14, fontWeight:600, display:"flex", gap:10, alignItems:"center" }}>
          <span>📄</span> Charger un jeu dégradé
        </button>
      </div>
      {loading && <div className="card" style={{ padding:40, textAlign:"center", color:SLATE }}><div className="mono" style={{ fontSize:14 }}>Analyse du fichier en cours…</div></div>}
      {d && !loading && (
        <div className="fade card" style={{ padding:28 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24, flexWrap:"wrap", gap:12 }}>
            <div>
              <div className="mono" style={{ fontSize:14, fontWeight:600, color:INK }}>{d.label}</div>
              <div style={{ fontSize:13, color:MIST, marginTop:2 }}>{d.rows.toLocaleString("fr")} lignes analysées</div>
            </div>
            <div style={{ position:"relative", display:"grid", placeItems:"center" }}>
              <Ring value={d.score} color={d.score>0.8?GREEN:d.score>0.6?AMBER:RED} />
              <div style={{ position:"absolute", textAlign:"center" }}>
                <div style={{ fontSize:30, fontWeight:800, color:NAVY }}>{d.score.toFixed(2)}</div>
                <div style={{ fontSize:11, color:MIST, fontWeight:600 }}>SCORE</div>
              </div>
            </div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12 }}>
            {[["Valeurs manquantes", d.missing],["Doublons", d.dups],["Incohérences", d.incoh]].map(([l,v]) => (
              <div key={l} style={{ background:PAPER, borderRadius:10, padding:"16px 18px" }}>
                <div style={{ fontSize:13, color:SLATE, marginBottom:6 }}>{l}</div>
                <div style={{ fontSize:24, fontWeight:800, color:v>10?RED:v>3?AMBER:GREEN }}>{v}%</div>
              </div>
            ))}
          </div>
          <div style={{ marginTop:24, textAlign:"right" }}>
            <button className="btn" onClick={onNext} style={{ background:NAVY, color:"#fff", padding:"13px 26px", borderRadius:11, fontSize:15, fontWeight:600 }}>Étape suivante : contrôle →</button>
          </div>
        </div>
      )}
    </div>
  );
}

function StepControl({ dataset, onNext, onBack }) {
  const THRESHOLD = 0.70;
  const d = DATASETS[dataset] || DATASETS.propre;
  const pass = d.score >= THRESHOLD;
  return (
    <div>
      <SectionTitle kicker="ÉTAPE 2 / 4" title="Contrôle avant entraînement"
        desc="Avant d'entraîner un modèle, DataGuard compare le score de qualité à un seuil minimal. En dessous, les données sont jugées inaptes : « garbage in, garbage out »." />
      <div className="card" style={{ padding:32 }}>
        <div style={{ fontSize:13, color:SLATE, marginBottom:10 }}>Score du jeu <span className="mono">{d.label}</span></div>
        <div style={{ position:"relative", height:44, background:PAPER, borderRadius:22, overflow:"hidden", marginTop:20 }}>
          <div style={{ position:"absolute", left:`${THRESHOLD*100}%`, top:0, bottom:0, width:2, background:NAVY, zIndex:2 }} />
          <div style={{ position:"absolute", left:`${THRESHOLD*100}%`, top:-22, transform:"translateX(-50%)", fontSize:11, color:NAVY, fontWeight:700 }}>seuil {THRESHOLD.toFixed(2)}</div>
          <div style={{ height:"100%", width:`${d.score*100}%`, background:pass?GREEN:RED, borderRadius:22, transformOrigin:"left", animation:"grow .9s ease both", display:"flex", alignItems:"center", justifyContent:"flex-end", paddingRight:14 }}>
            <span style={{ color:"#fff", fontWeight:800, fontSize:15 }}>{d.score.toFixed(2)}</span>
          </div>
        </div>
        <div style={{ marginTop:28, padding:22, borderRadius:12, background:pass?"#EAF6EF":"#FBECEA", border:`1px solid ${pass?"#BFE3CD":"#F1C9C2"}` }}>
          <div style={{ display:"flex", gap:14, alignItems:"center" }}>
            <div style={{ width:44, height:44, borderRadius:10, background:pass?GREEN:RED, color:"#fff", display:"grid", placeItems:"center", fontSize:22, fontWeight:800 }}>{pass?"✓":"!"}</div>
            <div>
              <div style={{ fontWeight:750, fontSize:17, color:pass?GREEN:RED }}>{pass?"Données aptes à l'entraînement":"Données inaptes — entraînement déconseillé"}</div>
              <div style={{ fontSize:14, color:SLATE, marginTop:3 }}>{pass?"Le score dépasse le seuil minimal. Vous pouvez entraîner un modèle en confiance.":"Le score est sous le seuil. Nettoyez ou complétez les données avant tout entraînement."}</div>
            </div>
          </div>
        </div>
        <div style={{ marginTop:26, display:"flex", justifyContent:"space-between" }}>
          <button className="btn" onClick={onBack} style={{ background:"transparent", color:SLATE, padding:"13px 20px", borderRadius:11, fontSize:15, fontWeight:600, border:`1px solid ${LINE}` }}>← Retour</button>
          <button className="btn" onClick={onNext} style={{ background:NAVY, color:"#fff", padding:"13px 26px", borderRadius:11, fontSize:15, fontWeight:600 }}>Étape suivante : diagnostic →</button>
        </div>
      </div>
    </div>
  );
}

function StepDiagnostic({ onNext, onBack }) {
  const [run, setRun] = useState(false);
  const [sel, setSel] = useState("Random Forest");
  useEffect(() => { const t=setTimeout(() => setRun(true), 400); return () => clearTimeout(t); }, []);
  const W=560, H=240, pad=40;
  const x=(i)=>pad+(i/(LEVELS.length-1))*(W-2*pad);
  const y=(r2)=>H-pad-r2*(H-2*pad);
  return (
    <div>
      <SectionTitle kicker="ÉTAPE 3 / 4" title="Diagnostic de robustesse"
        desc="DataGuard dégrade volontairement les données à des niveaux croissants (0 à 40 %) et trace la courbe de performance de chaque modèle. Une pente faible = un modèle robuste." />
      <div className="card" style={{ padding:28 }}>
        <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
          {MODELS.map((m) => (
            <button key={m.name} className="btn" onClick={() => setSel(m.name)}
              style={{ padding:"8px 14px", borderRadius:9, fontSize:13, fontWeight:600, background:sel===m.name?m.color:CARD, color:sel===m.name?"#fff":SLATE, border:`1px solid ${sel===m.name?m.color:LINE}` }}>{m.name}</button>
          ))}
        </div>
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ maxWidth:W }}>
          {[0,0.25,0.5,0.75,1].map((g) => (
            <g key={g}>
              <line x1={pad} x2={W-pad} y1={y(g)} y2={y(g)} stroke={LINE} strokeWidth="1" />
              <text x={pad-8} y={y(g)+4} textAnchor="end" fontSize="10" fill={MIST}>{g.toFixed(1)}</text>
            </g>
          ))}
          {LEVELS.map((lv,i) => (<text key={lv} x={x(i)} y={H-pad+18} textAnchor="middle" fontSize="10" fill={MIST}>{lv}%</text>))}
          {MODELS.map((m) => {
            const pts=CURVES[m.name].map((r2,i)=>`${x(i)},${y(r2)}`).join(" ");
            const active=sel===m.name;
            return <polyline key={m.name} points={pts} fill="none" stroke={m.color} strokeWidth={active?3.5:1.5} opacity={active?1:0.25}
              strokeDasharray={run?"0":"600"} strokeDashoffset={run?"0":"600"} style={{ transition:"stroke-dashoffset 1.2s ease, opacity .3s, stroke-width .3s" }} />;
          })}
          {run && CURVES[sel].map((r2,i) => (<circle key={i} cx={x(i)} cy={y(r2)} r="4" fill={MODELS.find(m=>m.name===sel).color} />))}
        </svg>
        <div style={{ marginTop:8, padding:16, background:PAPER, borderRadius:10, fontSize:14, color:SLATE, lineHeight:1.5 }}>
          <b style={{ color:INK }}>Lecture —</b> {sel==="SVR"?"Le SVR chute rapidement : c'est le modèle le moins robuste, il s'effondre dès que les données se dégradent.":sel==="Régression linéaire"?"La régression linéaire part plus bas mais résiste bien : sa pente est la plus douce en moyenne.":`${sel} est très performant sur données propres, mais sa performance décroît nettement au-delà de 20 % de dégradation.`}
        </div>
        <div style={{ marginTop:24, display:"flex", justifyContent:"space-between" }}>
          <button className="btn" onClick={onBack} style={{ background:"transparent", color:SLATE, padding:"13px 20px", borderRadius:11, fontSize:15, fontWeight:600, border:`1px solid ${LINE}` }}>← Retour</button>
          <button className="btn" onClick={onNext} style={{ background:NAVY, color:"#fff", padding:"13px 26px", borderRadius:11, fontSize:15, fontWeight:600 }}>Étape suivante : surveillance →</button>
        </div>
      </div>
    </div>
  );
}

function StepMonitoring({ onRestart, onBack }) {
  const [t, setT] = useState(0);
  const timer = useRef(null);
  const SERIES = [0.90, 0.89, 0.90, 0.88, 0.85, 0.82, 0.78, 0.74, 0.69, 0.66];
  const ALERT = 0.75;
  useEffect(() => { timer.current=setInterval(() => setT((v) => (v<SERIES.length?v+1:v)), 550); return () => clearInterval(timer.current); }, []);
  const shown = SERIES.slice(0, t);
  const current = shown[shown.length-1];
  const alerted = current!=null && current<ALERT;
  const W=560, H=200, pad=36;
  const x=(i)=>pad+(i/(SERIES.length-1))*(W-2*pad);
  const y=(v)=>H-pad-((v-0.6)/0.35)*(H-2*pad);
  return (
    <div>
      <SectionTitle kicker="ÉTAPE 4 / 4" title="Surveillance continue"
        desc="Une fois le modèle en service, DataGuard suit sa performance dans le temps et déclenche une alerte dès qu'elle passe sous le seuil critique — signal qu'un ré-entraînement est nécessaire." />
      <div className="card" style={{ padding:28 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18, flexWrap:"wrap", gap:12 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ width:10, height:10, borderRadius:"50%", background:alerted?RED:GREEN, boxShadow:`0 0 0 4px ${alerted?"#FBECEA":"#EAF6EF"}` }} />
            <span style={{ fontWeight:700, fontSize:15, color:alerted?RED:GREEN }}>{alerted?"ALERTE — modèle à ré-entraîner":"Modèle sous surveillance — OK"}</span>
          </div>
          <div className="mono" style={{ fontSize:13, color:SLATE }}>R² courant : <b style={{ color:alerted?RED:GREEN }}>{current?current.toFixed(2):"—"}</b></div>
        </div>
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ maxWidth:W }}>
          <line x1={pad} x2={W-pad} y1={y(ALERT)} y2={y(ALERT)} stroke={RED} strokeWidth="1.5" strokeDasharray="5 4" />
          <text x={W-pad} y={y(ALERT)-6} textAnchor="end" fontSize="10" fill={RED}>seuil critique {ALERT}</text>
          {shown.length>1 && (<polyline points={shown.map((v,i)=>`${x(i)},${y(v)}`).join(" ")} fill="none" stroke={NAVY} strokeWidth="2.5" />)}
          {shown.map((v,i) => (<circle key={i} cx={x(i)} cy={y(v)} r={i===shown.length-1?5:3} fill={v<ALERT?RED:NAVY} />))}
          {Array.from({length:SERIES.length}).map((_,i)=>(<text key={i} x={x(i)} y={H-pad+16} textAnchor="middle" fontSize="9" fill={MIST}>S{i+1}</text>))}
        </svg>
        {alerted && (
          <div className="fade" style={{ marginTop:8, padding:18, borderRadius:12, background:"#FBECEA", border:`1px solid #F1C9C2` }}>
            <div style={{ fontWeight:750, color:RED, fontSize:15, marginBottom:4 }}>⚠ Dégradation détectée</div>
            <div style={{ fontSize:14, color:SLATE, lineHeight:1.5 }}>La performance du modèle est passée sous le seuil critique (0,75). DataGuard recommande un audit des données récentes et un ré-entraînement du modèle sur des données actualisées.</div>
          </div>
        )}
        <div style={{ marginTop:26, display:"flex", justifyContent:"space-between" }}>
          <button className="btn" onClick={onBack} style={{ background:"transparent", color:SLATE, padding:"13px 20px", borderRadius:11, fontSize:15, fontWeight:600, border:`1px solid ${LINE}` }}>← Retour</button>
          <button className="btn" onClick={onRestart} style={{ background:TEAL, color:"#fff", padding:"13px 26px", borderRadius:11, fontSize:15, fontWeight:600 }}>✓ Diagnostic terminé — recommencer</button>
        </div>
      </div>
      <p style={{ textAlign:"center", fontSize:13, color:MIST, marginTop:20 }}>DataGuard · prototype de diagnostic de la robustesse — mémoire Hiba ITSMAIL</p>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("home");
  const [step, setStep] = useState(1);
  const [dataset, setDataset] = useState(null);
  const [maxStep, setMaxStep] = useState(1);
  const go = (s) => { setStep(s); setMaxStep((m) => Math.max(m, s)); };
  const reset = () => { setScreen("home"); setStep(1); setDataset(null); setMaxStep(1); };
  return (
    <div style={{ minHeight:"100vh", background:PAPER, fontFamily:"'Inter','Segoe UI',system-ui,sans-serif", color:INK }}>
      {screen==="home" ? <Home onStart={() => setScreen("app")} /> : (
        <div style={{ maxWidth:1080, margin:"0 auto", padding:"0 20px 60px" }}>
          <TopBar onReset={reset} />
          <Stepper step={step} maxStep={maxStep} onJump={(s) => s<=maxStep && setStep(s)} />
          <div className="fade" key={step}>
            {step===1 && <StepAudit dataset={dataset} setDataset={setDataset} onNext={() => go(2)} />}
            {step===2 && <StepControl dataset={dataset} onNext={() => go(3)} onBack={() => setStep(1)} />}
            {step===3 && <StepDiagnostic onNext={() => go(4)} onBack={() => setStep(2)} />}
            {step===4 && <StepMonitoring onRestart={reset} onBack={() => setStep(3)} />}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
